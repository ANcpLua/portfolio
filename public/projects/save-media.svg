<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="savemedia — browser extension that saves verified video files across Chrome, Edge and Firefox">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b1a"/><stop offset="1" stop-color="#07080c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.16" r="0.85">
      <stop offset="0" stop-color="#4263eb" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#4263eb" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#4263eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15161d"/><stop offset="1" stop-color="#101117"/>
    </linearGradient>
    <linearGradient id="popup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1f2b"/><stop offset="1" stop-color="#171922"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="popshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#dots)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <g filter="url(#soft)">
    <rect x="80" y="96" width="1120" height="608" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>
  <line x1="80" y1="178" x2="1200" y2="178" stroke="#ffffff" stroke-opacity="0.07"/>
  <circle cx="128" cy="137" r="9" fill="#ff5f56"/><circle cx="160" cy="137" r="9" fill="#ffbd2e"/><circle cx="192" cy="137" r="9" fill="#27c93f"/>
  <text x="244" y="146" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30" fill="#aeb4c0">savemedia · popup</text>
  <g transform="translate(996,114)">
    <rect width="124" height="46" rx="23" fill="#4263eb" fill-opacity="0.18" stroke="#5c7cfa" stroke-opacity="0.55"/>
    <text x="62" y="31" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#91a7fb">MV3</text>
  </g>

  <!-- popup card -->
  <g filter="url(#popshadow)">
    <rect x="340" y="216" width="600" height="320" rx="20" fill="url(#popup)" stroke="#ffffff" stroke-opacity="0.10"/>
  </g>
  <!-- popup header -->
  <g transform="translate(372,250)">
    <rect width="48" height="48" rx="12" fill="#4263eb" fill-opacity="0.2" stroke="#5c7cfa" stroke-opacity="0.5"/>
    <path d="M16 18 v12 l11 -6 z" fill="#91a7fb"/>
    <text x="66" y="24" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="600" fill="#eef1f8">savemedia</text>
    <text x="66" y="48" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="19" fill="#8088a0">passive detection · on</text>
    <g transform="translate(420,4)"><rect width="116" height="40" rx="9" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/><text x="58" y="27" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#c3c9da">⌥ + S</text></g>
  </g>
  <!-- detected row -->
  <g transform="translate(372,328)">
    <rect width="536" height="56" rx="12" fill="#27c93f" fill-opacity="0.08" stroke="#27c93f" stroke-opacity="0.3"/>
    <circle cx="32" cy="28" r="13" fill="#27c93f" fill-opacity="0.2" stroke="#27c93f"/><path d="M25 28 l5 5 l9 -10" fill="none" stroke="#5ee47e" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="62" y="36" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#d7e9da">Direct MP4 · 1080p · verified</text>
  </g>
  <!-- primary button -->
  <g transform="translate(372,400)">
    <rect width="536" height="58" rx="13" fill="#4263eb"/>
    <text x="268" y="38" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="600" fill="#ffffff">Save video</text>
  </g>
  <!-- refused row -->
  <g transform="translate(372,476)">
    <text x="0" y="24" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#6b7180">✕ DRM · live HLS · DASH — refused</text>
  </g>

  <!-- browser badges -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="26">
    <g transform="translate(372,572)"><rect width="166" height="56" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#5c7cfa" stroke-opacity="0.35"/><text x="83" y="37" text-anchor="middle" fill="#c3c9da">Chrome</text></g>
    <g transform="translate(557,572)"><rect width="166" height="56" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#5c7cfa" stroke-opacity="0.35"/><text x="83" y="37" text-anchor="middle" fill="#c3c9da">Edge</text></g>
    <g transform="translate(742,572)"><rect width="166" height="56" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#5c7cfa" stroke-opacity="0.35"/><text x="83" y="37" text-anchor="middle" fill="#c3c9da">Firefox</text></g>
  </g>
  <text x="640" y="668" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#727892">verified files only · HLS VOD → one MP4 · not a DRM bypass</text>
</svg>
