<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="CreatePdf.NET — a fluent .NET library for PDF text, bitmap, and OCR">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160a04"/><stop offset="1" stop-color="#0a0806"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#e8590c" stop-opacity="0.26"/>
      <stop offset="0.55" stop-color="#e8590c" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#e8590c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15161d"/><stop offset="1" stop-color="#101117"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="pageshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#dots)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <g filter="url(#soft)">
    <rect x="80" y="96" width="1120" height="608" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>
  <line x1="80" y1="178" x2="1200" y2="178" stroke="#ffffff" stroke-opacity="0.07"/>
  <circle cx="128" cy="137" r="9" fill="#ff5f56"/><circle cx="160" cy="137" r="9" fill="#ffbd2e"/><circle cx="192" cy="137" r="9" fill="#27c93f"/>
  <text x="244" y="146" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30" fill="#aeb4c0">Report.cs</text>
  <g transform="translate(996,114)">
    <rect width="124" height="46" rx="23" fill="#e8590c" fill-opacity="0.16" stroke="#fd7e3b" stroke-opacity="0.5"/>
    <text x="62" y="31" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#ffa46b">fluent</text>
  </g>

  <!-- fluent code -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="29">
    <text x="128" y="262" fill="#cdd2dc"><tspan fill="#8a93a6">await</tspan> Pdf.<tspan fill="#fd7e3b">Create</tspan>(Dye.Black)</text>
    <text x="128" y="314" fill="#cdd2dc">    .<tspan fill="#fd7e3b">AddText</tspan>(<tspan fill="#8fd98f">"Hello World"</tspan>)</text>
    <text x="128" y="366" fill="#cdd2dc">    .<tspan fill="#fd7e3b">AddPixelText</tspan>(<tspan fill="#8fd98f">"Hello"</tspan>)</text>
    <text x="128" y="418" fill="#cdd2dc">    .<tspan fill="#fd7e3b">AddLine</tspan>()</text>
    <text x="128" y="470" fill="#cdd2dc">    .<tspan fill="#fd7e3b">SaveAsync</tspan>(<tspan fill="#8fd98f">"report.pdf"</tspan>);</text>
  </g>
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22">
    <g transform="translate(128,524)"><rect width="98" height="42" rx="10" fill="#e8590c" fill-opacity="0.10" stroke="#e8590c" stroke-opacity="0.4"/><text x="49" y="28" text-anchor="middle" fill="#f7a877">text</text></g>
    <g transform="translate(240,524)"><rect width="118" height="42" rx="10" fill="#e8590c" fill-opacity="0.10" stroke="#e8590c" stroke-opacity="0.4"/><text x="59" y="28" text-anchor="middle" fill="#f7a877">bitmap</text></g>
    <g transform="translate(372,524)"><rect width="118" height="42" rx="10" fill="#e8590c" fill-opacity="0.10" stroke="#e8590c" stroke-opacity="0.4"/><text x="59" y="28" text-anchor="middle" fill="#f7a877">OCR</text></g>
  </g>
  <text x="128" y="616" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#727892">.NET 8 / 9 / 10 · on NuGet &amp; Docker Hub</text>

  <!-- rendered PDF page preview -->
  <g filter="url(#pageshadow)">
    <rect x="724" y="214" width="416" height="466" rx="6" fill="#f7f6f2"/>
  </g>
  <rect x="724" y="214" width="416" height="466" rx="6" fill="none" stroke="#000000" stroke-opacity="0.08"/>
  <text x="760" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#1a1a1a">Hello World</text>
  <line x1="760" y1="312" x2="1104" y2="312" stroke="#1a1a1a" stroke-opacity="0.25" stroke-width="2"/>
  <!-- pixel-text rendering -->
  <g transform="translate(760,344)">
    <rect width="220" height="74" rx="4" fill="#1a1a1a" fill-opacity="0.06"/>
    <g fill="#e8590c">
      <rect x="16" y="18" width="10" height="10"/><rect x="16" y="30" width="10" height="10"/><rect x="16" y="42" width="10" height="10"/><rect x="28" y="30" width="10" height="10"/><rect x="40" y="18" width="10" height="10"/><rect x="40" y="30" width="10" height="10"/><rect x="40" y="42" width="10" height="10"/>
      <rect x="62" y="18" width="10" height="10"/><rect x="62" y="30" width="10" height="10"/><rect x="62" y="42" width="10" height="10"/><rect x="74" y="18" width="10" height="10"/><rect x="86" y="18" width="10" height="10"/><rect x="74" y="42" width="10" height="10"/><rect x="86" y="42" width="10" height="10"/>
      <rect x="108" y="18" width="10" height="10"/><rect x="108" y="30" width="10" height="10"/><rect x="108" y="42" width="10" height="10"/><rect x="120" y="42" width="10" height="10"/><rect x="132" y="42" width="10" height="10"/>
    </g>
    <text x="160" y="50" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#666">pixel</text>
  </g>
  <text x="760" y="470" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#444">— rendered with text + bitmap glyphs</text>
  <g transform="translate(760,612)"><rect width="150" height="38" rx="8" fill="#e8590c" fill-opacity="0.12" stroke="#e8590c" stroke-opacity="0.4"/><text x="75" y="25" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" fill="#c2410c">OCR ✓ optional</text></g>
  <text x="1104" y="662" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="16" fill="#999">report.pdf</text>
</svg>
