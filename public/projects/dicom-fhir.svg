<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="dicom-fhir-viewer — DICOM image viewer with auto-generated FHIR R4 resources">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061214"/><stop offset="1" stop-color="#07080b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#22b8cf" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#22b8cf" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#22b8cf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15161d"/><stop offset="1" stop-color="#101117"/>
    </linearGradient>
    <radialGradient id="scan" cx="0.5" cy="0.46" r="0.6">
      <stop offset="0" stop-color="#3a4654" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#1a222c" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#04070a"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#dots)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <g filter="url(#soft)">
    <rect x="80" y="96" width="1120" height="608" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>
  <line x1="80" y1="178" x2="1200" y2="178" stroke="#ffffff" stroke-opacity="0.07"/>
  <circle cx="128" cy="137" r="9" fill="#ff5f56"/><circle cx="160" cy="137" r="9" fill="#ffbd2e"/><circle cx="192" cy="137" r="9" fill="#27c93f"/>
  <text x="244" y="146" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30" fill="#aeb4c0">study · CT_small.dcm</text>
  <g transform="translate(972,114)">
    <rect width="148" height="46" rx="23" fill="#22b8cf" fill-opacity="0.16" stroke="#22b8cf" stroke-opacity="0.5"/>
    <text x="74" y="31" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#6fe0ef">FHIR R4</text>
  </g>

  <!-- viewport -->
  <g>
    <rect x="128" y="212" width="488" height="468" rx="14" fill="#04070a" stroke="#22b8cf" stroke-opacity="0.18"/>
    <ellipse cx="372" cy="446" rx="200" ry="190" fill="url(#scan)"/>
    <!-- scanline -->
    <rect x="148" y="442" width="448" height="2" fill="#22b8cf" fill-opacity="0.35"/>
    <!-- crosshair -->
    <g stroke="#22b8cf" stroke-opacity="0.8" stroke-width="2">
      <line x1="372" y1="372" x2="372" y2="520"/><line x1="298" y1="446" x2="446" y2="446"/>
      <circle cx="372" cy="446" r="34" fill="none" stroke-opacity="0.5"/>
    </g>
    <!-- corner brackets -->
    <g stroke="#22b8cf" stroke-opacity="0.7" stroke-width="3" fill="none">
      <path d="M150 244 v-22 h22"/><path d="M594 244 v-22 h-22"/>
      <path d="M150 648 v22 h22"/><path d="M594 648 v22 h-22"/>
    </g>
    <text x="150" y="266" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#9fb4bd">CT · 512×512</text>
    <text x="594" y="266" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#9fb4bd">W 400  L 40</text>
    <text x="372" y="636" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#5d7681">window / level · pan · zoom</text>
  </g>

  <!-- FHIR json -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="27">
    <text x="664" y="252" fill="#5d7681">// auto-generated FHIR R4</text>
    <text x="664" y="300" fill="#cdd2dc">{</text>
    <text x="690" y="340" fill="#cdd2dc"><tspan fill="#7fd8e6">"resourceType"</tspan>:</text>
    <text x="720" y="378" fill="#a3e4ad">"ImagingStudy"</text>
    <text x="690" y="424" fill="#cdd2dc"><tspan fill="#7fd8e6">"status"</tspan>: <tspan fill="#a3e4ad">"available"</tspan></text>
    <text x="690" y="462" fill="#cdd2dc"><tspan fill="#7fd8e6">"modality"</tspan>: <tspan fill="#a3e4ad">"CT"</tspan></text>
    <text x="690" y="500" fill="#cdd2dc"><tspan fill="#7fd8e6">"series"</tspan>: <tspan fill="#f0b072">1</tspan>,</text>
    <text x="690" y="538" fill="#cdd2dc"><tspan fill="#7fd8e6">"endpoint"</tspan>: <tspan fill="#a3e4ad">"DICOMweb"</tspan></text>
    <text x="664" y="576" fill="#cdd2dc">}</text>
  </g>
  <text x="664" y="648" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#727892">React 19 · Hono · Orthanc · STOW / QIDO / WADO</text>
</svg>
