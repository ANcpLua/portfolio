<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="ANcpLua.Agents — C#-native agent runtime on the Microsoft Agent Framework">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0814"/><stop offset="1" stop-color="#07070c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#7c5cff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15161d"/><stop offset="1" stop-color="#101117"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.22"/><stop offset="1" stop-color="#7c5cff" stop-opacity="0.10"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#dots)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <g filter="url(#soft)">
    <rect x="80" y="96" width="1120" height="608" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>
  <line x1="80" y1="178" x2="1200" y2="178" stroke="#ffffff" stroke-opacity="0.07"/>
  <circle cx="128" cy="137" r="9" fill="#ff5f56"/><circle cx="160" cy="137" r="9" fill="#ffbd2e"/><circle cx="192" cy="137" r="9" fill="#27c93f"/>
  <text x="244" y="146" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30" fill="#aeb4c0">agent-runtime</text>
  <g transform="translate(944,114)">
    <rect width="176" height="46" rx="23" fill="#7c5cff" fill-opacity="0.14" stroke="#7c5cff" stroke-opacity="0.5"/>
    <text x="88" y="31" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#b4a4ff">MAF 1.11.x</text>
  </g>

  <!-- connectors -->
  <g stroke="#7c5cff" stroke-opacity="0.45" stroke-width="2.5" fill="none">
    <path d="M430 380 H 560"/>
    <path d="M820 380 C 880 380, 880 312, 944 312"/>
    <path d="M820 380 C 880 380, 880 470, 944 470"/>
  </g>

  <!-- upstream MAF agent (any provider, via MAF) -->
  <g transform="translate(130,326)">
    <rect width="300" height="108" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#7c5cff" stroke-opacity="0.45"/>
    <text x="150" y="52" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="600" fill="#e4dcff">MAF agent</text>
    <text x="150" y="86" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#a99cf0">IChatClient · AIAgent</text>
  </g>

  <!-- runtime node -->
  <g transform="translate(560,326)">
    <rect width="260" height="108" rx="16" fill="url(#node)" stroke="#7c5cff" stroke-opacity="0.7"/>
    <text x="130" y="50" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="600" fill="#efeaff">Agent runtime</text>
    <text x="130" y="84" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#a99cf0">.UseAgentTelemetry()</text>
  </g>

  <!-- span outputs -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24">
    <g transform="translate(944,284)"><rect width="200" height="52" rx="12" fill="#7c5cff" fill-opacity="0.16" stroke="#7c5cff" stroke-opacity="0.45"/><text x="20" y="33" fill="#cdc4ff">invoke_agent</text></g>
    <g transform="translate(944,442)"><rect width="200" height="52" rx="12" fill="#7c5cff" fill-opacity="0.16" stroke="#7c5cff" stroke-opacity="0.45"/><text x="20" y="33" fill="#cdc4ff">execute_tool</text></g>
  </g>

  <text x="130" y="638" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#727892">6 packages · MAF-native OpenTelemetry · sensitive data off by default</text>
</svg>
