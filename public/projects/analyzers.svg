<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="ANcpLua.Analyzers — Roslyn diagnostics with code fixes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07120c"/><stop offset="1" stop-color="#07080b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#2b9348" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#2b9348" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#2b9348" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15161d"/><stop offset="1" stop-color="#101117"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#dots)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <g filter="url(#soft)">
    <rect x="80" y="96" width="1120" height="608" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>
  <line x1="80" y1="178" x2="1200" y2="178" stroke="#ffffff" stroke-opacity="0.07"/>
  <circle cx="128" cy="137" r="9" fill="#ff5f56"/><circle cx="160" cy="137" r="9" fill="#ffbd2e"/><circle cx="192" cy="137" r="9" fill="#27c93f"/>
  <text x="244" y="146" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30" fill="#aeb4c0">Problems · 90 rules</text>
  <g transform="translate(960,114)">
    <rect width="160" height="46" rx="23" fill="#2b9348" fill-opacity="0.16" stroke="#46c46a" stroke-opacity="0.5"/>
    <text x="80" y="31" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#6bd98a">+ code fix</text>
  </g>

  <!-- diagnostics rows -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="26">
    <!-- row template: severity dot, ID, title, right tag -->
    <g transform="translate(128,222)">
      <circle cx="14" cy="18" r="11" fill="#ff5f56"/><path d="M9 13 L19 23 M19 13 L9 23" stroke="#2a0d0c" stroke-width="2.6" stroke-linecap="round"/>
      <text x="44" y="27" fill="#e0844f">AL1000</text>
      <text x="186" y="27" fill="#cdd2dc">Don't reassign primary-ctor params</text>
      <text x="1004" y="27" fill="#ff7b72" text-anchor="end">Error</text>
    </g>
    <g transform="translate(128,282)">
      <path d="M14 6 L26 28 L2 28 Z" fill="#ffbd2e"/><rect x="12.5" y="13" width="3" height="8" rx="1.5" fill="#2a1e05"/><circle cx="14" cy="24.5" r="1.7" fill="#2a1e05"/>
      <text x="44" y="27" fill="#e0844f">AL1009</text>
      <text x="186" y="27" fill="#cdd2dc">Avoid lock on non-Lock types</text>
      <text x="1004" y="27" fill="#e3b341" text-anchor="end">Warning</text>
    </g>
    <g transform="translate(128,342)">
      <path d="M14 6 L26 28 L2 28 Z" fill="#ffbd2e"/><rect x="12.5" y="13" width="3" height="8" rx="1.5" fill="#2a1e05"/><circle cx="14" cy="24.5" r="1.7" fill="#2a1e05"/>
      <text x="44" y="27" fill="#e0844f">AL1003</text>
      <text x="186" y="27" fill="#cdd2dc">Pattern-match Span vs constants</text>
      <text x="1004" y="27" fill="#e3b341" text-anchor="end">Warning</text>
    </g>
    <g transform="translate(128,402)">
      <circle cx="14" cy="18" r="11" fill="#ff5f56"/><path d="M9 13 L19 23 M19 13 L9 23" stroke="#2a0d0c" stroke-width="2.6" stroke-linecap="round"/>
      <text x="44" y="27" fill="#e0844f">AL1002</text>
      <text x="186" y="27" fill="#cdd2dc">Don't divide by constant zero</text>
      <text x="1004" y="27" fill="#ff7b72" text-anchor="end">Error</text>
    </g>
    <g transform="translate(128,462)">
      <circle cx="14" cy="18" r="12" fill="#2b9348" fill-opacity="0.25" stroke="#46c46a"/><path d="M14 11 v8 M14 24 v0.5" stroke="#6bd98a" stroke-width="2.4" stroke-linecap="round"/>
      <text x="44" y="27" fill="#6bd98a">AL1010</text>
      <text x="186" y="27" fill="#aab0bd">Prefer pattern matching for null  →  fix available</text>
    </g>
  </g>

  <line x1="128" y1="520" x2="1152" y2="520" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- domain band chips -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20">
    <g transform="translate(128,554)"><rect width="148" height="40" rx="20" fill="#2b9348" fill-opacity="0.10" stroke="#2b9348" stroke-opacity="0.4"/><text x="74" y="26" text-anchor="middle" fill="#8fcf9f">Correctness</text></g>
    <g transform="translate(290,554)"><rect width="96" height="40" rx="20" fill="#2b9348" fill-opacity="0.10" stroke="#2b9348" stroke-opacity="0.4"/><text x="48" y="26" text-anchor="middle" fill="#8fcf9f">Async</text></g>
    <g transform="translate(400,554)"><rect width="140" height="40" rx="20" fill="#2b9348" fill-opacity="0.10" stroke="#2b9348" stroke-opacity="0.4"/><text x="70" y="26" text-anchor="middle" fill="#8fcf9f">AOT / trim</text></g>
    <g transform="translate(554,554)"><rect width="162" height="40" rx="20" fill="#2b9348" fill-opacity="0.10" stroke="#2b9348" stroke-opacity="0.4"/><text x="81" y="26" text-anchor="middle" fill="#8fcf9f">ASP.NET Core</text></g>
    <g transform="translate(730,554)"><rect width="212" height="40" rx="20" fill="#2b9348" fill-opacity="0.10" stroke="#2b9348" stroke-opacity="0.4"/><text x="106" y="26" text-anchor="middle" fill="#8fcf9f">Agent-governance</text></g>
  </g>
  <text x="128" y="640" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#727892">AL1000–AL1899 · 9 domain bands · every rule ships a code fix</text>
</svg>
