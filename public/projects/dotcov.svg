<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="DotCov — streaming Cobertura coverage toolkit with a CI gate">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04141a"/><stop offset="1" stop-color="#07080b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#0891b2" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#0891b2" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15161d"/><stop offset="1" stop-color="#101117"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#dots)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <g filter="url(#soft)">
    <rect x="80" y="96" width="1120" height="608" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>
  <line x1="80" y1="178" x2="1200" y2="178" stroke="#ffffff" stroke-opacity="0.07"/>
  <circle cx="128" cy="137" r="9" fill="#ff5f56"/><circle cx="160" cy="137" r="9" fill="#ffbd2e"/><circle cx="192" cy="137" r="9" fill="#27c93f"/>
  <text x="244" y="146" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30" fill="#aeb4c0">TestResults · coverage</text>
  <g transform="translate(976,114)">
    <rect width="144" height="46" rx="23" fill="#0891b2" fill-opacity="0.16" stroke="#22b8cf" stroke-opacity="0.5"/>
    <text x="72" y="31" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#5fd0e6">CI gate</text>
  </g>

  <text x="128" y="248" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30"><tspan fill="#27c93f">$</tspan> <tspan fill="#cdd2dc">dotcov check </tspan><tspan fill="#5fd0e6">TestResults/</tspan><tspan fill="#cdd2dc"> --min-line 80</tspan></text>

  <!-- table header -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#6b7180">
    <text x="128" y="310">Module</text>
    <text x="828" y="310" text-anchor="end">Line</text>
    <text x="1008" y="310" text-anchor="end">Branch</text>
  </g>
  <line x1="128" y1="324" x2="1152" y2="324" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- rows: name, bar track+fill, line%, branch% -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="26">
    <!-- row 1 -->
    <text x="128" y="378" fill="#cdd2dc">DotCov</text>
    <rect x="430" y="362" width="318" height="18" rx="9" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="430" y="362" width="300" height="18" rx="9" fill="#22b8cf"/>
    <text x="828" y="382" text-anchor="end" fill="#e7edf2">94.2%</text>
    <text x="1008" y="382" text-anchor="end" fill="#9aa1ad">88.1%</text>
    <!-- row 2 -->
    <text x="128" y="442" fill="#cdd2dc">DotCov.Tool</text>
    <rect x="430" y="426" width="318" height="18" rx="9" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="430" y="426" width="292" height="18" rx="9" fill="#22b8cf"/>
    <text x="828" y="446" text-anchor="end" fill="#e7edf2">91.7%</text>
    <text x="1008" y="446" text-anchor="end" fill="#9aa1ad">80.4%</text>
    <!-- row 3 -->
    <text x="128" y="506" fill="#cdd2dc">DotCov.Nuke</text>
    <rect x="430" y="490" width="318" height="18" rx="9" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="430" y="490" width="306" height="18" rx="9" fill="#22b8cf"/>
    <text x="828" y="510" text-anchor="end" fill="#e7edf2">96.0%</text>
    <text x="1008" y="510" text-anchor="end" fill="#9aa1ad">90.2%</text>
  </g>

  <line x1="128" y1="548" x2="1152" y2="548" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- verdict -->
  <g transform="translate(128,576)">
    <circle cx="18" cy="22" r="17" fill="#27c93f" fill-opacity="0.18" stroke="#27c93f"/>
    <path d="M10 22 L16 28 L27 16" fill="none" stroke="#5ee47e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="32" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="27" fill="#cdd2dc">line 93.9% ≥ 80%</text>
    <g transform="translate(420,6)"><rect width="92" height="40" rx="10" fill="#27c93f" fill-opacity="0.16" stroke="#27c93f" stroke-opacity="0.6"/><text x="46" y="27" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#5ee47e">PASS</text></g>
    <text x="566" y="32" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#727892">→ $GITHUB_STEP_SUMMARY</text>
  </g>
</svg>
