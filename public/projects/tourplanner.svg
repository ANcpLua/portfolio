<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="TourPlanner-Angular — Angular 21 SPA on a .NET 10 API">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#140609"/><stop offset="1" stop-color="#0a070a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#dd0031" stop-opacity="0.26"/>
      <stop offset="0.55" stop-color="#dd0031" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#dd0031" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15161d"/><stop offset="1" stop-color="#101117"/>
    </linearGradient>
    <linearGradient id="elev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dd0031" stop-opacity="0.45"/><stop offset="1" stop-color="#dd0031" stop-opacity="0.02"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#dots)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <g filter="url(#soft)">
    <rect x="80" y="96" width="1120" height="608" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>
  <line x1="80" y1="178" x2="1200" y2="178" stroke="#ffffff" stroke-opacity="0.07"/>
  <circle cx="128" cy="137" r="9" fill="#ff5f56"/><circle cx="160" cy="137" r="9" fill="#ffbd2e"/><circle cx="192" cy="137" r="9" fill="#27c93f"/>
  <text x="244" y="146" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30" fill="#aeb4c0">tour-detail</text>
  <g transform="translate(936,114)">
    <rect width="184" height="46" rx="23" fill="#dd0031" fill-opacity="0.16" stroke="#ff5470" stroke-opacity="0.5"/>
    <text x="92" y="31" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#ff8197">OpenAPI-typed</text>
  </g>

  <!-- map -->
  <g>
    <rect x="128" y="212" width="540" height="468" rx="14" fill="#0c0e13" stroke="#ffffff" stroke-opacity="0.06"/>
    <!-- faint roads -->
    <g stroke="#2a2f3a" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M128 320 H 668"/><path d="M128 470 H 668"/><path d="M128 600 H 668"/>
      <path d="M250 212 V 680"/><path d="M430 212 V 680"/><path d="M560 212 V 680"/>
    </g>
    <!-- route -->
    <path d="M214 624 C 300 560, 250 460, 372 430 S 540 360, 590 270" fill="none" stroke="#dd0031" stroke-width="7" stroke-linecap="round"/>
    <!-- pins -->
    <g>
      <path d="M214 624 c -22 -30 -22 -46 0 -46 22 0 22 16 0 46 z" fill="#dd0031"/><circle cx="214" cy="590" r="7" fill="#140609"/>
      <path d="M590 270 c -22 -30 -22 -46 0 -46 22 0 22 16 0 46 z" fill="#ff5470"/><circle cx="590" cy="236" r="7" fill="#140609"/>
    </g>
    <g transform="translate(150,652)"><rect width="178" height="40" rx="8" fill="#0c0e13" fill-opacity="0.9" stroke="#dd0031" stroke-opacity="0.4"/><text x="16" y="27" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#ff8197">42.0 km route</text></g>
  </g>

  <!-- tour card -->
  <g transform="translate(708,212)">
    <rect width="444" height="468" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="32" y="68" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="600" fill="#f0e7ea">Wachau Loop</text>
    <text x="32" y="106" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#8a8f9c">Krems → Dürnstein → Krems</text>

    <line x1="32" y1="138" x2="412" y2="138" stroke="#ffffff" stroke-opacity="0.06"/>
    <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="25">
      <text x="32" y="184" fill="#8a8f9c">Distance</text><text x="412" y="184" text-anchor="end" fill="#e7dde0">42.0 km</text>
      <text x="32" y="228" fill="#8a8f9c">Est. time</text><text x="412" y="228" text-anchor="end" fill="#e7dde0">2 h 10 m</text>
      <text x="32" y="272" fill="#8a8f9c">Difficulty</text><text x="412" y="272" text-anchor="end" fill="#ff8197">moderate</text>
    </g>

    <text x="32" y="320" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" fill="#6b7180">elevation</text>
    <path d="M32 410 L 80 384 L 132 396 L 188 350 L 244 372 L 300 332 L 356 360 L 412 344 L 412 430 L 32 430 Z" fill="url(#elev)" stroke="#dd0031" stroke-width="2.5"/>
  </g>

  <text x="128" y="724" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#7d8391" opacity="0">spacer</text>
</svg>
