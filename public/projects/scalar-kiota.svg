<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" role="img" aria-label="Scalar.Kiota.Extension — Kiota SDK generation served through Scalar API docs">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04150f"/><stop offset="1" stop-color="#07080b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#0ca678" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#0ca678" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#0ca678" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15161d"/><stop offset="1" stop-color="#101117"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#dots)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>
  <g filter="url(#soft)">
    <rect x="80" y="96" width="1120" height="608" rx="28" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>
  <line x1="80" y1="178" x2="1200" y2="178" stroke="#ffffff" stroke-opacity="0.07"/>
  <circle cx="128" cy="137" r="9" fill="#ff5f56"/><circle cx="160" cy="137" r="9" fill="#ffbd2e"/><circle cx="192" cy="137" r="9" fill="#27c93f"/>
  <text x="244" y="146" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30" fill="#aeb4c0">Scalar · /api</text>
  <g transform="translate(960,114)">
    <rect width="160" height="46" rx="23" fill="#0ca678" fill-opacity="0.16" stroke="#20c997" stroke-opacity="0.5"/>
    <text x="80" y="31" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#5fd9b6">Kiota SDK</text>
  </g>

  <!-- sidebar -->
  <g transform="translate(128,212)">
    <rect width="328" height="468" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="28" y="50" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#6b7180">ENDPOINTS</text>
    <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22">
      <g transform="translate(20,76)"><rect width="84" height="38" rx="8" fill="#27c93f" fill-opacity="0.16"/><text x="42" y="26" text-anchor="middle" fill="#5ee47e">GET</text><text x="116" y="26" fill="#aab0bd">/todos</text></g>
      <g transform="translate(20,128)"><rect width="288" height="46" rx="9" fill="#0ca678" fill-opacity="0.12" stroke="#20c997" stroke-opacity="0.4"/><rect x="8" y="4" width="92" height="38" rx="8" fill="#4263eb" fill-opacity="0.22"/><text x="54" y="30" text-anchor="middle" fill="#91a7fb">POST</text><text x="112" y="30" fill="#e7edf2">/todos</text></g>
      <g transform="translate(20,188)"><rect width="84" height="38" rx="8" fill="#27c93f" fill-opacity="0.16"/><text x="42" y="26" text-anchor="middle" fill="#5ee47e">GET</text><text x="116" y="26" fill="#aab0bd">/todos/{id}</text></g>
      <g transform="translate(20,240)"><rect width="118" height="38" rx="8" fill="#ff5f56" fill-opacity="0.16"/><text x="59" y="26" text-anchor="middle" fill="#ff8a82">DELETE</text><text x="150" y="26" fill="#aab0bd">/{id}</text></g>
    </g>
    <line x1="20" y1="316" x2="308" y2="316" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="28" y="356" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#6b7180">theme</text>
    <text x="300" y="356" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#5fd9b6">Saturn</text>
    <text x="28" y="398" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#6b7180">native AOT</text>
    <text x="300" y="398" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#5ee47e">✓</text>
  </g>

  <!-- detail -->
  <g transform="translate(492,212)">
    <rect width="660" height="468" rx="14" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.06"/>
    <g transform="translate(32,34)"><rect width="100" height="44" rx="9" fill="#4263eb" fill-opacity="0.22"/><text x="50" y="30" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#91a7fb">POST</text></g>
    <text x="148" y="64" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="28" fill="#e7edf2">/api/todos</text>
    <g transform="translate(32,104)"><rect width="170" height="40" rx="20" fill="#27c93f" fill-opacity="0.14" stroke="#27c93f" stroke-opacity="0.4"/><text x="85" y="27" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#5ee47e">201 Created</text></g>

    <text x="32" y="208" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="600" fill="#cdd2dc">Generate a typed client →</text>
    <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="23">
      <g transform="translate(32,234)"><rect width="190" height="50" rx="12" fill="#0ca678" fill-opacity="0.14" stroke="#20c997" stroke-opacity="0.45"/><text x="95" y="33" text-anchor="middle" fill="#7fe3c4">TypeScript</text></g>
      <g transform="translate(238,234)"><rect width="120" height="50" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/><text x="60" y="33" text-anchor="middle" fill="#aab0bd">C#</text></g>
      <g transform="translate(374,234)"><rect width="150" height="50" rx="12" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/><text x="75" y="33" text-anchor="middle" fill="#aab0bd">Python</text></g>
    </g>

    <rect x="32" y="318" width="596" height="106" rx="12" fill="#0b0d12" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="54" y="362" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="23" fill="#5f6675">// kiota-generated</text>
    <text x="54" y="398" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="24" fill="#cdd2dc"><tspan fill="#8a93a6">await</tspan> client.Todos.<tspan fill="#7fe3c4">PostAsync</tspan>(body);</text>
  </g>
</svg>
